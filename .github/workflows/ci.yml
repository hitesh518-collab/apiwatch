name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace

  msrv:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - run: cargo check --workspace --locked

  compat:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: actions/cache@v4
        with:
          path: .compat-cache
          key: compat-${{ runner.os }}-${{ hashFiles('compat/specs.json') }}
      - run: python -m unittest discover -s scripts/tests -p "test_fetch_compat_specs.py"
      - run: python scripts/fetch_compat_specs.py
      - run: cargo test --test compat -- --ignored --nocapture
      - run: >-
          cargo run -p apiwatch-lock-size-report --
          --manifest compat/specs.json
          --compat-dir .compat-cache
          --privacy-fixture testdata/openapi/privacy_sentinels.yaml
          --max-lock-bytes 5242880
          --json-out docs/benchmarks/phase-1-lock-size-report.json
          --markdown-out docs/benchmarks/phase-1-lock-size-report.md
          --check

  action-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          openapi: testdata/openapi/verify_matching.yaml
          name: users
          lock: testdata/lock/verify_users.lock

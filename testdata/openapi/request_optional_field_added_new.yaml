openapi: 3.0.3
info:
  title: Example
  version: 1.0.0
paths:
  /users:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                nickname:
                  type: string
      responses:
        "201":
          description: Created

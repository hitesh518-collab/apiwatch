openapi: 3.0.3
info:
  title: Example
  version: 1.0.0
components:
  securitySchemes:
    BearerBase:
      type: http
      scheme: bearer
    bearerAuth:
      $ref: "#/components/securitySchemes/BearerBase"
paths:
  /users:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
